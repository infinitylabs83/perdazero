const fmtDataHora = (ts) => {
  if (!ts) return '';
  const d = new Date(ts);
  const hoje = new Date();
  const ontem = new Date(); ontem.setDate(hoje.getDate() - 1);
  const hora = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

  if (d.toDateString() === ontem.toDateString()) return `Ontem, ${hora}`;
  return `${d.toLocaleDateString('pt-BR')} às ${hora}`;
};

  const [rNs, setRNs] = useState('');
  const [rCs, setRCs] = useState('');
  const [rLd, setRLd] = useState(false);
  const [rMsg, setRMsg] = useState('');
  const [fotoModal, setFotoModal] = useState(null);
  const [copiedSlug, setCopiedSlug] = useState(null);
  const fileInputRef = useRef(null);

  // Gestão produtos/equipe/lojas
  const [novoProdNome, setNovoProdNome] = useState('');
  const [novoProdEmoji, setNovoProdEmoji] = useState('📦');
  const [novoProdCusto, setNovoProdCusto] = useState('');
  const [novoProdUnidade, setNovoProdUnidade] = useState('un');

  // ==========================================

  // ==========================================

    if (!slugQR || !supabase) return;
    async function carregarLojaQR() {
      const { data: lojaData, error } = await supabase
        .from('lojas')
        .select('id, nome, slug_acesso, conta_id, contas(id, nome_rede, logo_rede)')
        .eq('slug_acesso', slugQR)
        .single();

      if (error || !lojaData) {
        setView('qr_invalido');
        return;
      }

      // Carrega equipe desta loja
      const { data: equipeData } = await supabase
        .from('equipe')
        .select('*')
        .eq('loja_id', lojaData.id)
        .order('nome');

      // Carrega produtos desta conta
      const { data: prodData } = await supabase
        .from('produtos')
        .select('*')
        .eq('conta_id', lojaData.conta_id)
        .order('nome');

      setLojaQR(lojaData);
      setConta(lojaData.contas);
      setEquipe(equipeData || []);
      setProdutos(prodData || []);
      setView('qr_select_user');
    }
    carregarLojaQR();
  }, [slugQR]);

  // ==========================================
  // AUTH SUPABASE — sessão do dono
  // ==========================================
  useEffect(() => {
    if (!supabase || slugQR) return;

    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) carregarPerfil(session.user);
      else setView('auth');
    });

    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        setView('rec');
        return;
      }
      if (session?.user) carregarPerfil(session.user);
      else { setAuthUser(null); setPerfil(null); setConta(null); setView('auth'); }
    });

    return () => subscription.unsubscribe();
  }, []);

  const carregarPerfil = async (user) => {
    setAuthUser(user);
    const { data: p } = await supabase
      .from('perfis')
      .select('*, contas(*)')
      .eq('id', user.id)
      .single();

    if (p) {
      setPerfil(p);
      setConta(p.contas);
      setSettNome(p.contas?.nome_rede || '');
      setSettLogo(p.contas?.logo_rede || null);

      setView('dashboard'); // onboarding verificado via useEffect

    if (!supabase) return;
    const [lojasRes, equipeRes, prodRes, histRes] = await Promise.all([
      supabase.from('lojas').select('*').eq('conta_id', conta_id).order('nome'),
      supabase.from('equipe').select('*').eq('conta_id', conta_id).order('nome'),
      supabase.from('produtos').select('*').eq('conta_id', conta_id).order('nome'),
      supabase.from('historico').select('*').eq('conta_id', conta_id).order('timestamp', { ascending: false }),
    ]);
    if (lojasRes.data) setLojas(lojasRes.data);
    if (equipeRes.data) setEquipe(equipeRes.data);
    if (prodRes.data) setProdutos(prodRes.data);
    if (histRes.data) setHistorico(histRes.data);
  };

  const emojiDict = { 'carne':'🥩','blend':'🥩','picanha':'🥩','bacon':'🥓','pao':'🍞','pão':'🍞','hamburguer':'🍔','burger':'🍔','batata':'🍟','frita':'🍟','cebola':'🧅','alface':'🥬','salada':'🥗','tomate':'🍅','queijo':'🧀','cheddar':'🧀','frango':'🍗','peixe':'🐟','ovo':'🥚','refri':'🥤','coca':'🥤','suco':'🧃' };
  const buscarEmoji = (txt) => { const l = txt.toLowerCase(); for (const [k,v] of Object.entries(emojiDict)) if (l.includes(k)) return v; return '📦'; };

  const motivosLista = [

    { id:2, nome:'Estragado / Mofado', icone:'🦠', cor:'bg-purple-100 text-purple-600' },

    { id:4, nome:'Devolvido (Cliente)', icone:'😞', cor:'bg-blue-100 text-blue-600' },
    { id:5, nome:'Queda no Chão', icone:'👇', cor:'bg-yellow-100 text-yellow-600' },
    { id:6, nome:'Outro', icone:'➕', cor:'bg-gray-100 text-gray-600' },
  ];

    setReg({ foto_arquivo:null, foto_url_local:null, produto:null, qtd:'', unidade:'un', motivo:null, observacao:'', custo_unitario:0, icone:'📦' });

    setIsCustomMotivo(false); setCustomMotivo('');
    setShowColegasList(false); setSelectedColega(null); setObsColega('');
    setFlowStep(1);
  };

    if (filtroLoja !== 'todas' && item.loja_id !== parseInt(filtroLoja)) return false;
    const d = new Date(item.timestamp);
    if (filtroMesEsp) {
      const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return m === filtroMesEsp;
    }
    const hoje = new Date();
    const diffDias = (new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate()) - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 86400000;
    if (filtroTempo === 'hoje') return diffDias === 0;
    if (filtroTempo === 'semana') return diffDias <= 7;

      || null;

      const ext = reg.foto_arquivo.name.split('.').pop();

      const { error: upErr } = await supabase.storage.from('fotos_perdas').upload(fname, reg.foto_arquivo);

  // Exportar PDF — relatório rico com gráficos
  const exportarPDF = () => {

    const logo = settLogo || conta?.logo_rede || '';
    const dataGer = new Date().toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'});

    // Rankings
    const porProd = {}; dados.forEach(i => { porProd[i.prod]=(porProd[i.prod]||0)+(i.custo_total||0); });

    const porResp = {}; dados.forEach(i => { if(i.responsavel!=='Nao identificado') porResp[i.responsavel]=(porResp[i.responsavel]||0)+(i.custo_total||0); });

    const porMotivo = {}; dados.forEach(i => { porMotivo[i.motivo]=(porMotivo[i.motivo]||0)+(i.custo_total||0); });
    const topMotivo = Object.entries(porMotivo).sort((a,b)=>b[1]-a[1]);
    const porLoja = {}; dados.forEach(i => { const n=lojas.find(l=>l.id===i.loja_id)?.nome||'?'; porLoja[n]=(porLoja[n]||0)+(i.custo_total||0); });
    const topLoja = Object.entries(porLoja).sort((a,b)=>b[1]-a[1]);

    // Linhas da tabela detalhada

      '<svg viewBox="0 0 160 160" width="140" height="140" style="flex-shrink:0">'+svgDonut+'</svg>'+

        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><div style="width:10px;height:10px;border-radius:2px;background:'+cores[i%cores.length]+';flex-shrink:0"></div><span style="font-size:10px;color:#374151;flex:1">'+label+'</span><span style="font-size:10px;font-weight:700;color:#374151">'+Math.round((val/totalPrej||0)*100)+'%</span></div>'

            <p className="text-slate-400 text-sm">Digite sua nova senha abaixo</p>
          </div>
          <div className="space-y-3">
            <input type="password" placeholder="Nova senha (min. 6 caracteres)" value={rNs} onChange={e => setRNs(e.target.value)} className="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-medium focus:border-brand focus:outline-none"/>
            <input type="password" placeholder="Confirmar nova senha" value={rCs} onChange={e => setRCs(e.target.value)} className="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-medium focus:border-brand focus:outline-none"/>
            {rNs.length > 0 && rNs !== rCs ? <p className="text-orange-400 text-xs text-center">As senhas nao coincidem</p> : null}
            {rMsg.length > 0 ? <p className={mCls}>{rMsg}</p> : null}
            <button className={bCls} disabled={!okSave} onClick={doReset}>
              {rLd ? 'Salvando...' : 'Salvar Nova Senha'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (view === 'auth') {
    return <TelaAuth onLogin={() => {}} supabase={supabase} />;
  }

  // ==========================================
  // TELA: QR CODE CARREGANDO
  // ==========================================
  if (view === 'qr_loading') {
    return (
      <div className="flex-1 flex flex-col bg-slate-900 justify-center items-center">
        <div className="w-12 h-12 border-4 border-brand border-t-transparent rounded-full animate-spin mb-4"></div>
        <p className="text-white font-bold">Identificando sua loja...</p>
      </div>
    );
  }

  if (view === 'qr_invalido') {
    return (
      <div className="flex-1 flex flex-col bg-slate-900 justify-center items-center p-8 text-center">
        <div className="text-6xl mb-4">❌</div>
        <h2 className="text-white text-2xl font-bold mb-2">QR Code Inválido</h2>
        <p className="text-slate-400">Este código não existe ou foi desativado. Peça ao gerente um novo QR Code.</p>
      </div>
    );
  }

  // ==========================================
  // TELA: QR — SELECIONAR FUNCIONÁRIO
  // ==========================================
  if (view === 'qr_select_user') {
    const equipeDaLoja = equipe.filter(e => e.loja_id === lojaQR?.id);
    const nomeLoja = lojaQR?.nome || 'Loja';
    const nomeRede = lojaQR?.contas?.nome_rede || 'PerdaZero';

    return (
      <div className="flex-1 flex flex-col bg-gray-50 animate-fade-in min-h-0">
        <div className="bg-brand p-6 pt-10 pb-8 rounded-b-[40px] shadow-lg text-white text-center pt-safe flex-shrink-0">
          <LogoRede size={52} />
          <p className="text-green-100 text-sm font-bold tracking-widest uppercase mt-3">{nomeRede}</p>
          <h2 className="text-2xl font-black mt-1">{nomeLoja}</h2>
          <p className="text-green-200 text-sm mt-1">Quem está registrando?</p>
        </div>

        <div className="flex-1 p-5 overflow-y-auto hide-scrollbar min-h-0">
          {equipeDaLoja.length === 0 && (
            <div className="text-center py-12">
              <p className="text-4xl mb-3">👥</p>
              <p className="text-slate-500 font-medium">Nenhum funcionário cadastrado nesta loja ainda.</p>
              <p className="text-slate-400 text-sm mt-1">Peça ao gerente para cadastrar a equipe.</p>
            </div>
          )}
          <div className="grid grid-cols-2 gap-4 pb-6">
            {equipeDaLoja.map(m => (
              <button key={m.id} onClick={() => {
                if (m.funcao !== 'operacional' && m.codigo) {
                  setQrPinUser(m);
                  setQrPinAttempt('');
                  setQrPinError(false);
                } else {
                  setFuncUser(m); resetFlow(); setView('flow_qr');
                }
              }}
                className="bg-white border border-gray-200 p-5 rounded-3xl flex flex-col items-center shadow-sm hover:border-brand hover:shadow-md active:scale-95 transition-all">
                <div className="text-5xl mb-3 bg-gray-50 p-4 rounded-full shadow-inner">{m.avatar || '👤'}</div>
                <span className="font-bold text-slate-800 text-lg text-center leading-tight">{m.nome.split(' ')[0]}</span>
                {m.funcao !== 'operacional' && (
                  <span className="mt-2 text-[9px] bg-slate-800 text-white px-2 py-0.5 rounded-full uppercase flex items-center">
                    <Ico.Lock/> Senha
                  </span>
                )}
              </button>
            ))}
          </div>

          {/* MODAL DE PIN NO QR */}
          {qrPinUser && (
            <div className="absolute inset-0 bg-slate-900/95 z-50 flex flex-col items-center justify-center p-6 animate-fade-in">
              <div className="bg-white w-full max-w-sm rounded-[40px] p-8 flex flex-col items-center shadow-2xl">
                <button onClick={() => setQrPinUser(null)} className="absolute top-8 left-8 text-slate-400"><Ico.Back/></button>
                <div className="text-6xl mb-4 mt-2">{qrPinUser.avatar || '👤'}</div>
                <h2 className="text-2xl font-bold text-slate-800 mb-1">Olá, {(qrPinUser.nome || '').split(' ')[0]}</h2>
                <p className="text-slate-500 text-sm mb-6 font-medium">Digite seu PIN de acesso</p>
                <div className="flex space-x-3 mb-6">
                  {[0,1,2,3].map(i => (
                    <div key={i} className={`w-12 h-12 rounded-xl flex items-center justify-center text-3xl font-bold border-2 transition-all ${qrPinAttempt[i] ? 'border-brand text-brand bg-green-50 scale-110' : 'border-gray-200 text-transparent bg-gray-50'}`}>
                      {qrPinAttempt[i] ? '●' : '○'}
                    </div>
                  ))}
                </div>
                {qrPinError && <p className="text-red-500 text-xs font-bold mb-4 animate-bounce">PIN incorreto. Tente novamente.</p>}
                <div className="grid grid-cols-3 gap-3 w-full">
                  {[1,2,3,4,5,6,7,8,9].map(n => (
                    <button key={n} onClick={() => {
                      if (qrPinAttempt.length < 4) {
                        const novo = qrPinAttempt + n;
                        setQrPinAttempt(novo);
                        if (novo.length === 4) {
                          if (novo === qrPinUser.codigo) {
                            const u = qrPinUser;
                            setQrPinUser(null);
                            setQrPinAttempt('');
                            setQrPinError(false);
                            setFuncUser(u); resetFlow(); setView('flow_qr');
                          } else {
                            setQrPinError(true);
                            setTimeout(() => { setQrPinAttempt(''); setQrPinError(false); }, 800);
                          }
                        }
                      }
                    }} className="bg-gray-50 text-slate-800 text-2xl font-bold py-4 rounded-2xl active:bg-gray-200">{n}</button>
                  ))}
                  <div></div>
                  <button onClick={() => {
                    if (qrPinAttempt.length < 4) {
                      const novo = qrPinAttempt + '0';
                      setQrPinAttempt(novo);
                      if (novo.length === 4) {
                        if (novo === qrPinUser.codigo) {
                          const u = qrPinUser;
                          setQrPinUser(null); setQrPinAttempt(''); setQrPinError(false);
                          setFuncUser(u); resetFlow(); setView('flow_qr');
                        } else {
                          setQrPinError(true);
                          setTimeout(() => { setQrPinAttempt(''); setQrPinError(false); }, 800);
                        }
                      }
                    }
                  }} className="bg-gray-50 text-slate-800 text-2xl font-bold py-4 rounded-2xl active:bg-gray-200">0</button>
                  <button onClick={() => setQrPinAttempt(qrPinAttempt.slice(0,-1))} className="bg-red-50 text-red-500 py-4 rounded-2xl flex items-center justify-center active:bg-red-100"><Ico.Delete/></button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ==========================================
  // TELA: FLOW DE REGISTRO (funciona para QR e para manager)
  // ==========================================
  const isQRFlow = view === 'flow_qr';
  const isManagerFlow = view === 'flow_mgr';

  if (isQRFlow || isManagerFlow) {
    if (isUploading) return (
      <div className="flex-1 flex flex-col bg-slate-900 justify-center items-center">
        <div className="w-16 h-16 border-4 border-brand border-t-transparent rounded-full animate-spin mb-4"></div>
        <p className="text-white font-bold tracking-widest uppercase">Salvando...</p>
      </div>
    );

    const voltarFlow = () => {
      if (flowStep === 5 && selectedColega) { setSelectedColega(null); setObsColega(''); return; }
      if (flowStep === 5 && showColegasList) { setShowColegasList(false); return; }
      if (flowStep === 4 && isCustomMotivo) { setIsCustomMotivo(false); setCustomMotivo(''); return; }
      if (flowStep > 1) { setFlowStep(flowStep - 1); return; }
      if (isQRFlow) setView('qr_select_user');
      else setView('dashboard');
    };

    const proceedToStep5 = (motivo) => {
      if (motivo === 'Outro' && !customMotivo.trim()) return;
      setReg({...reg, motivo: motivo === 'Outro' ? customMotivo : motivo});
      setFlowStep(5);
    };

    const equipeDaLoja = isQRFlow ? equipe.filter(e => e.loja_id === lojaQR?.id) : equipe;

    return (
      <div className="flex-1 flex flex-col bg-white min-h-0">
        {/* Header */}
        <div className="p-4 border-b flex items-center shadow-sm z-10 pt-safe shrink-0">
          <button onClick={voltarFlow} className="p-2 text-slate-500"><Ico.Back/></button>
          <div className="flex-1 text-center">
            <p className="font-bold text-slate-400 text-xs tracking-widest">PASSO {flowStep} DE 5</p>
            {isQRFlow && <p className="text-[10px] text-brand font-bold">{funcUser?.nome?.split(' ')[0]} • {lojaQR?.nome}</p>}
          </div>
          <div className="w-10"></div>
        </div>

        {/* Passo 1: Foto */}
        {flowStep === 1 && (
          <div className="flex-1 flex flex-col animate-slide-up bg-gray-50 min-h-0">
            <div className="flex-1 overflow-y-auto hide-scrollbar flex flex-col items-center p-6">
              <h3 className="text-2xl font-bold text-slate-800 mb-8 shrink-0">📸 Foto da Perda</h3>
              {reg.foto_url_local ? (
                <div className="w-full max-w-xs relative mb-8 rounded-2xl overflow-hidden shadow-lg border-4 border-brand shrink-0">
                  <img src={reg.foto_url_local} className="w-full h-48 object-cover" alt="foto"/>
                  <div className="absolute bottom-2 right-2 bg-brand text-white text-xs font-bold px-2 py-1 rounded">✓ Foto Capturada</div>
                </div>
              ) : (
                <div className="w-full max-w-xs h-48 bg-gray-100 rounded-2xl mb-8 flex flex-col items-center justify-center border-2 border-dashed border-gray-300 text-gray-400 shrink-0">
                  <Ico.Camera size={48}/>
                  <p className="text-sm mt-2">Tire uma foto da perda</p>
                </div>
              )}
              <button onClick={() => fileInputRef.current?.click()} className="w-full max-w-xs py-5 bg-brand text-white font-bold rounded-2xl text-xl flex items-center justify-center shadow-xl active:scale-95 transition-transform shrink-0">
                <Ico.Camera size={20}/> <span className="ml-2">{reg.foto_url_local ? 'Tirar Outra' : 'Abrir Câmera'}</span>
              </button>
              <input ref={fileInputRef} type="file" accept="image/*" capture="environment" className="hidden"
                onChange={(e) => {
                  if (e.target.files?.[0]) {
                    const f = e.target.files[0];
                    setReg({...reg, foto_arquivo:f, foto_url_local:URL.createObjectURL(f)});
                  }
                }}/>
            </div>
            <div className="p-6 pt-0 bg-gray-50 shrink-0 flex flex-col items-center">
              {reg.foto_url_local
                ? <button onClick={() => setFlowStep(2)} className="w-full max-w-xs py-4 bg-slate-900 text-white font-bold rounded-2xl text-lg shadow-xl active:scale-95 animate-fade-in">Avançar com esta foto</button>
                : <button onClick={() => setFlowStep(2)} className="text-slate-400 underline font-medium p-4">Pular (Sem Foto)</button>
              }
            </div>
          </div>
        )}

        {/* Passo 2: Produto — apenas da lista */}
        {flowStep === 2 && (
          <div className="flex-1 flex flex-col animate-slide-up bg-gray-50 min-h-0">
            <div className="flex-1 p-6 overflow-y-auto hide-scrollbar flex flex-col">
              <h3 className="text-xl font-bold text-slate-800 mb-1 shrink-0">Qual produto foi perdido?</h3>
              <p className="text-xs text-slate-400 mb-4 shrink-0">Selecione da lista abaixo</p>
              <div className="bg-white rounded-2xl border border-gray-200 flex items-center gap-2 px-4 py-3 mb-4 shrink-0 shadow-sm">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18" className="text-slate-400 shrink-0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input autoFocus placeholder="Buscar produto..." value={buscaProd}
                  onChange={e => setBuscaProd(e.target.value)}
                  className="flex-1 text-sm font-medium text-slate-800 focus:outline-none placeholder:text-slate-400"/>
                {buscaProd && <button onClick={() => setBuscaProd('')} className="text-slate-400 text-xl leading-none">x</button>}
              </div>
              {produtos.filter(p => p.nome.toLowerCase().includes(buscaProd.toLowerCase())).length === 0 && (
                <div className="text-center py-6 shrink-0">
                  <p className="text-3xl mb-2">🔍</p>
                  <p className="text-slate-500 text-sm font-medium">{buscaProd ? buscaProd + " nao encontrado" : "Nenhum produto cadastrado"}</p>
                  <p className="text-slate-400 text-xs mt-1">Peça ao gerente para cadastrar este produto</p>
                </div>
              )}
              <div className="grid grid-cols-2 gap-3 shrink-0 pb-4">
                {produtos.filter(p => p.nome.toLowerCase().includes(buscaProd.toLowerCase())).map(p => (
                  <button key={p.id} onClick={() => { setReg({...reg,produto:p.nome,custo_unitario:p.custo||0,icone:p.icone}); setBuscaProd(''); setFlowStep(3); }}
                    className="bg-white border border-gray-200 p-4 rounded-2xl flex items-center shadow-sm active:border-brand active:bg-green-50 transition-colors">
                    <span className="text-3xl mr-3">{p.icone}</span>
                    <div className="flex-1 min-w-0">
                      <span className="font-bold text-slate-700 text-sm block leading-tight truncate">{p.nome}</span>
                      {p.custo > 0 ? <span className="text-[10px] text-brand font-bold">{fmt(p.custo)}/{p.unidade||'un'}</span> : <span className="text-[10px] text-orange-400 font-bold">sem custo</span>}
                    </div>
                  </button>
                ))}
              </div>
            </div>
            <div className="p-4 pt-0 bg-gray-50 shrink-0 border-t border-gray-100">
              <button onClick={() => { setReg({...reg,produto:'Outro (nao catalogado)',custo_unitario:0,icone:'📦'}); setBuscaProd(''); setFlowStep(3); }}
                className="w-full py-3 rounded-2xl font-bold text-slate-500 text-sm bg-white border border-gray-200 shadow-sm active:bg-gray-100">
                + Produto nao esta na lista? Registrar como Outro
              </button>
            </div>
          </div>
        )}

        {/* Passo 3: Quantidade */}
        {flowStep === 3 && (
          <div className="flex-1 flex flex-col animate-slide-up bg-gray-50 min-h-0">
            <div className="flex-1 p-6 flex flex-col items-center overflow-y-auto hide-scrollbar">
              <h3 className="text-lg font-bold text-slate-800 mb-1 shrink-0">Quantidade perdida de</h3>
              <p className="text-brand font-extrabold text-xl mb-4 text-center shrink-0">{reg.icone} {reg.produto}</p>
              <div className="flex bg-gray-200 p-1.5 rounded-2xl mb-6 w-full max-w-xs shrink-0">
                {['un','kg','L'].map(u => (
                  <button key={u} onClick={() => setReg({...reg,unidade:u})}
                    className={`flex-1 py-2 font-bold rounded-xl transition-all ${reg.unidade===u?'bg-white shadow-sm text-slate-800':'text-slate-500'}`}>
                    {u === 'un' ? 'Unid.' : u === 'kg' ? 'Kg' : 'Litro'}
                  </button>
                ))}
              </div>
              <div className="text-5xl font-black text-slate-800 mb-6 h-14 flex items-baseline shrink-0">
                {reg.qtd || '0'} <span className="text-2xl text-slate-400 ml-2 font-bold">{reg.unidade}</span>
              </div>
              <div className="grid grid-cols-3 gap-2 w-full max-w-xs shrink-0 pb-6">
                {[1,2,3,4,5,6,7,8,9].map(n => (
                  <button key={n} onClick={() => setReg({...reg,qtd:reg.qtd+n})} className="bg-white border border-gray-200 text-2xl font-bold py-3 rounded-2xl active:bg-gray-100 shadow-sm">{n}</button>
                ))}
                <button onClick={() => { if (!reg.qtd.includes(',')) setReg({...reg,qtd:reg.qtd+','}); }} className="bg-white border border-gray-200 text-2xl font-bold py-3 rounded-2xl active:bg-gray-100 shadow-sm">,</button>
                <button onClick={() => setReg({...reg,qtd:reg.qtd+'0'})} className="bg-white border border-gray-200 text-2xl font-bold py-3 rounded-2xl active:bg-gray-100 shadow-sm">0</button>
                <button onClick={() => setReg({...reg,qtd:reg.qtd.slice(0,-1)})} className="bg-red-50 border border-red-100 text-red-500 py-3 rounded-2xl flex justify-center items-center shadow-sm active:bg-red-100"><Ico.Delete/></button>
              </div>
            </div>
            {(() => {
              const qtdNum = parseFloat((reg.qtd||'0').toString().replace(',','.')) || 0;
              const limite = reg.unidade === 'un' ? 100 : 50;
              if (qtdNum > limite && !qtdAlertaVisto) return (
                <div className="mx-6 mb-4 bg-red-50 border-2 border-red-400 rounded-2xl p-4 shrink-0">
                  <p className="text-red-600 font-bold text-sm mb-1">Quantidade muito alta!</p>
                  <p className="text-red-500 text-xs mb-3">Voce digitou {reg.qtd} {reg.unidade}. {reg.unidade === 'kg' ? 'Exemplo correto: 0,450 kg (e nao 450).' : 'Isso parece muito alto para uma perda.'}</p>
                  <div className="flex gap-2">
                    <button onClick={() => setReg({...reg,qtd:''})} className="flex-1 py-2 bg-red-500 text-white font-bold text-xs rounded-xl">Corrigir</button>
                    <button onClick={() => setQtdAlertaVisto(true)} className="flex-1 py-2 bg-gray-200 text-slate-700 font-bold text-xs rounded-xl">Esta correto</button>
                  </div>
                </div>
              );
              return null;
            })()}
            <div className="p-6 pt-0 bg-gray-50 shrink-0 w-full flex justify-center">
              {(() => {
                const qtdNum = parseFloat((reg.qtd||'0').toString().replace(',','.')) || 0;
                const limite = reg.unidade === 'un' ? 100 : 50;
                const bloqueado = qtdNum > limite && !qtdAlertaVisto;
                return (
                  <button onClick={() => setFlowStep(4)} disabled={!reg.qtd || bloqueado}
                    className={reg.qtd && !bloqueado ? 'w-full max-w-xs py-4 rounded-2xl font-bold text-white text-lg bg-brand shadow-lg' : 'w-full max-w-xs py-4 rounded-2xl font-bold text-white text-lg bg-gray-300'}>AVANCAR</button>
                );
              })()}
            </div>
          </div>
        )}

        {/* Passo 4: Motivo */}
        {flowStep === 4 && !isCustomMotivo && (
          <div className="flex-1 flex flex-col animate-slide-up bg-gray-50 min-h-0">
            <div className="flex-1 p-6 overflow-y-auto hide-scrollbar flex flex-col">
              <h3 className="text-xl font-bold text-slate-800 mb-6 shrink-0">Por que foi perdido?</h3>
              <div className="grid grid-cols-2 gap-3 shrink-0 pb-6">
                {motivosLista.map(m => (
                  <button key={m.id} onClick={() => m.nome === 'Outro' ? setIsCustomMotivo(true) : proceedToStep5(m.nome)}
                    className="bg-white border border-gray-200 p-5 rounded-3xl flex flex-col items-center shadow-sm active:scale-95 transition-transform">
                    <div className={`w-14 h-14 rounded-full flex items-center justify-center text-3xl mb-3 shadow-inner ${m.cor}`}>{m.icone}</div>
                    <span className="font-bold text-slate-700 text-sm text-center">{m.nome}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {flowStep === 4 && isCustomMotivo && (
          <div className="flex-1 flex flex-col animate-slide-up bg-gray-50 min-h-0">
            <div className="flex-1 p-6 flex flex-col">
              <h3 className="text-xl font-bold text-slate-800 mb-2">Descreva o Motivo</h3>
              <textarea autoFocus placeholder="Ex: A geladeira desligou durante a noite..." value={customMotivo}
                onChange={e => setCustomMotivo(e.target.value)}
                className="w-full p-4 border border-gray-200 rounded-2xl text-base font-medium text-slate-800 focus:border-brand focus:outline-none resize-none h-32"/>
            </div>
            <div className="p-6 pt-0 shrink-0">
              <button onClick={() => proceedToStep5('Outro')} disabled={!customMotivo.trim()}
                className={`w-full py-4 rounded-2xl font-bold text-white text-lg ${customMotivo.trim()?'bg-brand shadow-lg':'bg-gray-300'}`}>Avançar</button>
            </div>
          </div>
        )}

        {/* Passo 5: Responsável */}
        {flowStep === 5 && !showColegasList && (
          <div className="flex-1 flex flex-col animate-slide-up bg-gray-50 min-h-0">
            <div className="flex-1 p-6 flex flex-col items-center justify-center text-center">
              <h3 className="text-3xl font-black text-slate-800 mb-2">Você sabe quem foi?</h3>
              <p className="text-slate-500 font-medium mb-8 text-sm px-4">Se apontar um colega, apenas a gerência verá. É confidencial.</p>
              <div className="w-full max-w-xs space-y-4">
                <button onClick={() => finalizarRegistro(funcUser?.nome || perfil?.nome || 'Gestor')}
                  className="w-full py-5 bg-white border border-gray-200 rounded-2xl font-bold text-slate-700 text-lg shadow-sm active:bg-gray-100 flex items-center justify-center">🙋‍♂️ Fui eu mesmo</button>
                <button onClick={() => finalizarRegistro('Não identificado')}
                  className="w-full py-5 bg-white border border-gray-200 rounded-2xl font-bold text-slate-700 text-lg shadow-sm active:bg-gray-100 flex items-center justify-center">🤷‍♂️ Não sei / Achei assim</button>
                <button onClick={() => setShowColegasList(true)}
                  className="w-full py-5 bg-white border border-gray-200 rounded-2xl font-bold text-brand text-lg shadow-sm active:bg-gray-100 flex items-center justify-center">👉 Foi outra pessoa...</button>
              </div>
            </div>
          </div>
        )}

        {flowStep === 5 && showColegasList && !selectedColega && (
          <div className="flex-1 flex flex-col animate-slide-up bg-gray-50 min-h-0">
            <div className="flex-1 p-6 overflow-y-auto hide-scrollbar flex flex-col">
              <h3 className="text-xl font-bold text-slate-800 mb-2">Selecione o Colega:</h3>
              <p className="text-slate-500 text-sm mb-6">Somente a gerência verá essa informação.</p>
              <div className="grid grid-cols-2 gap-4 pb-6">
                {equipeDaLoja.filter(e => e.id !== funcUser?.id).map(c => (
                  <button key={c.id} onClick={() => setSelectedColega(c.nome)}
                    className="bg-white border border-gray-200 p-4 rounded-2xl flex flex-col items-center shadow-sm active:border-brand active:bg-green-50 transition-colors">
                    <span className="text-4xl mb-2">{c.avatar || '👤'}</span>
                    <span className="font-bold text-slate-700 text-sm text-center">{c.nome.split(' ')[0]}</span>

    const copiarURL = (slug) => {
      const url = `${APP_URL}?loja=${slug}`;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(() => {
            setCopiedSlug(slug);
            setTimeout(() => setCopiedSlug(null), 2000);
          }).catch(() => fallbackCopiar(url, slug));
        } else {
          fallbackCopiar(url, slug);
        }
      } catch(e) { fallbackCopiar(url, slug); }
    };

    const fallbackCopiar = (url, slug) => {
      const el = document.createElement('textarea');
      el.value = url;
      el.setAttribute('readonly', '');
      el.style.position = 'absolute';
      el.style.left = '-9999px';
      document.body.appendChild(el);
      el.select();
      el.setSelectionRange(0, 99999);
      document.execCommand('copy');
      document.body.removeChild(el);
      setCopiedSlug(slug);
      setTimeout(() => setCopiedSlug(null), 2000);
    };

    const getQRUrl = (slug) => {
      const url = encodeURIComponent(`${APP_URL}?loja=${slug}`);

      const pag = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>QR Code - ' + nome + '</title><style>' +
        '*{box-sizing:border-box;margin:0;padding:0}' +
        'body{font-family:Arial,Helvetica,sans-serif;background:#f1f5f9;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}' +
        '@media print{body{background:#fff;padding:0;min-height:unset}@page{margin:10mm}}' +
        '.card{background:#fff;border-radius:24px;padding:32px 28px;text-align:center;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}' +
        '.top-bar{width:60px;height:4px;background:#00A86B;border-radius:2px;margin:0 auto 24px}' +
        '.logo-img{width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;border:3px solid #00A86B}' +

  // ==========================================

  // ==========================================
  if (view === 'mgr_produtos') {

      if (!novoProdNome.trim()) return;
      const custo = parseFloat(novoProdCusto.replace(',','.')) || 0;
      const obj = { conta_id: conta.id, nome: novoProdNome, icone: novoProdEmoji || '📦', custo, unidade: novoProdUnidade || 'un' };
      if (supabase) {
        const { data, error } = await supabase.from('produtos').insert([obj]).select();
        if (error) return alert('Erro: ' + error.message);
        setProdutos([data[0], ...produtos]);
      }
      setNovoProdNome(''); setNovoProdEmoji('📦'); setNovoProdCusto(''); setNovoProdUnidade('un');
    };

    const saveProd = async (id) => {
      const custo = parseFloat((editProd.custo||'').toString().replace(',','.')) || 0;
      const obj = { nome: editProd.nome, icone: editProd.icone || '📦', custo };
      if (supabase) { await supabase.from('produtos').update(obj).eq('id', id); }
      setProdutos(produtos.map(p => p.id===id?{...p,...obj}:p));
      setEditingProdId(null);
    };

    const deleteProd = async (id) => {
      if (!window.confirm('Excluir?')) return;
      if (supabase) { await supabase.from('produtos').delete().eq('id', id); }
      setProdutos(produtos.filter(p => p.id !== id));
      setEditingProdId(null);
    };

    return (
      <div className="flex-1 flex bg-gray-100 animate-slide-up h-full relative min-h-0"><Sidebar/><div className="dsk-main flex-1 flex flex-col h-full min-h-0 pt-safe pb-safe overflow-hidden">
        <TrialBanner/>
        <div className="bg-slate-900 text-white p-6 shadow-md flex-shrink-0">

            </div>
            <div className="flex gap-2 mb-3">
              <input type="text" inputMode="decimal" value={novoProdCusto} onChange={e => setNovoProdCusto(e.target.value)}

              <select value={novoProdUnidade} onChange={e => setNovoProdUnidade(e.target.value)}
                className="w-24 bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-700 focus:border-brand focus:outline-none">
                <option value="un">/ un</option>
                <option value="kg">/ kg</option>
                <option value="L">/ L</option>
              </select>
            </div>
            {!novoProdCusto && novoProdNome && <p className="text-orange-500 text-xs font-bold mb-3">⚠️ Sem custo, o prejuízo ficará como R$ 0,00 nos relatórios.</p>}

          </div>

          <div className="grid grid-cols-2 gap-3">

                <input value={editProd.nome} onChange={e => setEditProd({...editProd,nome:e.target.value})} className="font-bold text-slate-700 text-sm text-center mb-2 border-b focus:outline-none"/>
                <input value={editProd.custo} onChange={e => setEditProd({...editProd,custo:e.target.value})} className="text-xs text-brand font-bold text-center border-b focus:outline-none mb-3" placeholder="Custo R$"/>

                  <button onClick={() => saveProd(p.id)} className="bg-brand text-white p-2 rounded-lg font-bold text-xs px-4">Salvar</button>
                </div>
              </div>

              <div key={p.id} className="bg-white border border-gray-100 p-4 pt-8 rounded-2xl flex flex-col items-center shadow-sm relative">

          </div>

      </div></div>
    );

  // ==========================================

  if (view === 'mgr_equipe') {
    const canAdd = novoMemNome.trim() && novoMemLoja && (novoMemFuncao === 'operacional' || novoMemCodigo.length === 4);

    const addMem = async () => {
      if (!canAdd) return;
      const lojaId = parseInt(novoMemLoja);
      const obj = { conta_id: conta.id, loja_id: lojaId, nome: novoMemNome, funcao: novoMemFuncao, codigo: novoMemFuncao==='operacional'?'':novoMemCodigo, avatar: novoMemAvatar };
      if (supabase) {
        const { data, error } = await supabase.from('equipe').insert([obj]).select();
        if (error) return alert('Erro ao salvar: ' + error.message);
        setEquipe([...equipe, data[0]]);
      }
      setNovoMemNome(''); setNovoMemCodigo(''); setNovoMemAvatar('👨‍🍳'); setNovoMemLoja('');
    };

    const saveMem = async (id) => {
      if (editMem.funcao !== 'operacional' && editMem.codigo?.length !== 4) return alert('PIN deve ter 4 dígitos.');
      const obj = { nome: editMem.nome, funcao: editMem.funcao, codigo: editMem.funcao==='operacional'?'':editMem.codigo, avatar: editMem.avatar };
      if (supabase) { await supabase.from('equipe').update(obj).eq('id', id); }
      setEquipe(equipe.map(m => m.id===id?{...m,...obj}:m));
      setEditingMemId(null);
    };

    const deleteMem = async (id) => {
      if (!window.confirm('Remover colaborador?')) return;
      if (supabase) { await supabase.from('equipe').delete().eq('id', id); }
      setEquipe(equipe.filter(m => m.id !== id));
      setEditingMemId(null);
    };

      <div className="flex-1 flex bg-gray-100 animate-slide-up h-full relative min-h-0"><Sidebar/><div className="dsk-main flex-1 flex flex-col h-full min-h-0 pt-safe pb-safe overflow-hidden">
        <TrialBanner/>
        <div className="bg-slate-900 text-white p-6 shadow-md flex-shrink-0">

            <div className="space-y-3 mb-4">
              <div className="flex gap-2">
                <select value={novoMemAvatar} onChange={e => setNovoMemAvatar(e.target.value)} className="w-20 bg-gray-50 border border-gray-200 rounded-xl p-2 text-center text-xl focus:border-brand focus:outline-none">
                  {['👨‍🍳','👩‍🍳','👔','🛡️','👨‍💼','👩‍💼'].map(a => <option key={a} value={a}>{a}</option>)}
                </select>
                <input type="text" value={novoMemNome} onChange={e => setNovoMemNome(e.target.value)}
                  className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none" placeholder="Nome completo"/>
              </div>

              <select value={novoMemLoja} onChange={e => setNovoMemLoja(e.target.value)}
                className={`w-full bg-gray-50 border rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none ${!novoMemLoja ? 'border-orange-300' : 'border-gray-200'}`}>
                <option value="">⚠️ Selecione a loja (obrigatório)</option>
                {lojas.map(l => <option key={l.id} value={l.id}>{l.nome}</option>)}

              <div className="flex gap-2">
                {novoMemFuncao !== 'operacional' ? (
                  <input type="text" inputMode="numeric" maxLength="4" value={novoMemCodigo}

                ) : (
                  <div className="w-24 bg-gray-100 border border-gray-200 rounded-xl p-3 text-center font-bold text-slate-400 text-xs flex items-center justify-center">S/ Senha</div>
                )}
                <select value={novoMemFuncao} onChange={e => { setNovoMemFuncao(e.target.value); if(e.target.value==='operacional') setNovoMemCodigo(''); }}
                  className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none">
                  <option value="operacional">Operacional / Cozinha</option>
                  <option value="gerente">Gerente da Loja</option>
                  <option value="escritorio">Escritório (todas as lojas)</option>
                </select>
              </div>
            </div>
            <button onClick={addMem} disabled={!canAdd}
              className={`w-full font-bold p-3 rounded-xl ${canAdd?'bg-brand text-white':'bg-gray-200 text-gray-400'}`}>Criar Acesso</button>
          </div>

          <div className="space-y-3">
            {lojas.map(loja => {
              const membros = equipe.filter(m => m.loja_id === loja.id);

              return (
                <div key={loja.id}>
                  <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 px-1">🏪 {loja.nome}</p>
                  {membros.map(m => editingMemId===m.id ? (
                    <div key={m.id} className="bg-white border-2 border-brand p-4 rounded-2xl mb-3 shadow-lg">
                      <div className="flex gap-2 mb-3">
                        <select value={editMem.avatar} onChange={e => setEditMem({...editMem,avatar:e.target.value})} className="w-16 text-center text-xl border-b focus:outline-none bg-transparent">
                          {['👨‍🍳','👩‍🍳','👔','🛡️','👨‍💼','👩‍💼'].map(a => <option key={a} value={a}>{a}</option>)}
                        </select>
                        <input value={editMem.nome} onChange={e => setEditMem({...editMem,nome:e.target.value})} className="flex-1 font-bold text-slate-700 text-sm border-b focus:border-brand focus:outline-none"/>
                      </div>
                      <div className="flex gap-2 mb-3">
                        {editMem.funcao !== 'operacional' ? (

                        ) : (
                          <div className="w-20 text-center text-slate-400 text-[10px] border-b flex items-center justify-center bg-gray-50 rounded">S/ SENHA</div>
                        )}
                        <select value={editMem.funcao} onChange={e => { setEditMem({...editMem,funcao:e.target.value}); if(e.target.value==='operacional') setEditMem(p=>({...p,codigo:''})); }} className="flex-1 text-xs border-b focus:outline-none">
                          <option value="operacional">Operacional</option>
                          <option value="gerente">Gerente</option>
                        </select>
                      </div>
                      <div className="flex justify-between">
                        <button onClick={() => deleteMem(m.id)} className="bg-red-50 text-red-500 p-2 rounded-lg"><Ico.Delete/></button>
                        <button onClick={() => saveMem(m.id)} className="bg-brand text-white py-2 px-6 rounded-lg font-bold text-xs">Salvar</button>
                      </div>
                    </div>
                  ) : (
                    <div key={m.id} className="bg-white border border-gray-100 p-4 rounded-2xl flex items-center justify-between shadow-sm mb-3">
                      <div>
                        <p className="font-bold text-slate-800 text-sm">{m.avatar} {m.nome}
                          {m.funcao !== 'operacional' && <span className="ml-2 text-[8px] bg-slate-800 text-white px-1.5 py-0.5 rounded uppercase">{m.funcao}</span>}

                        <p className="text-[10px] text-slate-400 font-bold mt-0.5 uppercase tracking-wider">
                          {m.funcao === 'operacional' ? 'Sem senha' : <>PIN: <span className="bg-gray-100 px-1 rounded font-mono">{m.codigo}</span></>}

                      </div>
                      <button onClick={() => { setEditingMemId(m.id); setEditMem({nome:m.nome,funcao:m.funcao,codigo:m.codigo||'',avatar:m.avatar||'👨‍🍳'}); }} className="text-slate-400 hover:text-brand p-3 bg-gray-50 rounded-full shadow-sm"><Ico.Edit/></button>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
        <BottomNav/>
      </div></div>
    );
  }

  // ==========================================
  // AJUSTES
  // ==========================================
  if (view === 'mgr_settings') {
    const saveSettings = async () => {
      if (supabase) {
        const { error } = await supabase.from('contas').update({ nome_rede: settNome, logo_rede: settLogo }).eq('id', conta.id);
        if (error) return alert('Erro: ' + error.message);

      setConta({...conta, nome_rede: settNome, logo_rede: settLogo});
      alert('✅ Configurações salvas!');
      setView('dashboard');
    };

    return (
      <div className="flex-1 flex bg-gray-100 animate-slide-up h-full relative min-h-0"><Sidebar/><div className="dsk-main flex-1 flex flex-col h-full min-h-0 pt-safe pb-safe overflow-hidden">
        <TrialBanner/>
        <div className="bg-slate-900 text-white p-6 shadow-md flex-shrink-0">
          <p className="text-brand text-xs font-bold tracking-widest mb-1">CONFIGURAÇÕES</p>
          <h2 className="text-2xl font-bold">Ajustes da Conta</h2>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-24 min-h-0">
          <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <h3 className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">Identidade Visual</h3>
            <div className="mb-5">
              <label className="text-[10px] font-bold text-slate-400 uppercase">Logo da Rede</label>
              <div className="flex items-center gap-4 mt-2">
                <div className="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center overflow-hidden border border-gray-200 shadow-inner">
                  {settLogo ? <img src={settLogo} className="w-full h-full object-cover"/> : <div className="text-brand"><Ico.Shield/></div>}
                </div>
                <label className="flex-1 bg-white border border-gray-200 text-slate-600 text-sm font-bold p-3 rounded-xl text-center cursor-pointer hover:bg-gray-50 shadow-sm">
                  Alterar Logo
                  <input type="file" accept="image/*" className="hidden" onChange={e => {
                    if (e.target.files?.[0]) {
                      const reader = new FileReader();
                      reader.onload = (ev) => {
                        const img = new Image();
                        img.onload = () => {
                          const canvas = document.createElement('canvas');
                          const max = 300; let w = img.width, h = img.height;
                          if (w > h) { if (w > max) { h *= max/w; w = max; } } else { if (h > max) { w *= max/h; h = max; } }
                          canvas.width = w; canvas.height = h;
                          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                          setSettLogo(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.src = ev.target.result;
                      };
                      reader.readAsDataURL(e.target.files[0]);
                    }
                  }}/>
                </label>
              </div>
            </div>
            <div className="mb-5">
              <label className="text-[10px] font-bold text-slate-400 uppercase">Nome da Rede</label>
              <input type="text" value={settNome} onChange={e => setSettNome(e.target.value)}
                className="w-full mt-2 bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-800 focus:border-brand focus:outline-none"/>
            </div>
            <button onClick={saveSettings} className="w-full bg-slate-900 text-white font-bold p-4 rounded-xl shadow-md active:scale-95 transition-transform">Salvar Alterações</button>
          </div>

          <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <h3 className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">Sua Conta</h3>
            <p className="text-sm text-slate-600 mb-1"><span className="font-bold text-slate-800">Email:</span> {authUser?.email}</p>
            <p className="text-sm text-slate-600 mb-1"><span className="font-bold text-slate-800">Plano:</span> {conta?.plano}</p>
            {conta?.plano === 'trial' && <p className="text-sm text-slate-600"><span className="font-bold text-slate-800">Trial expira em:</span> {diasRestantesTrial(conta.trial_expira_em)} dias</p>}
            <button onClick={handleLogout} className="w-full mt-4 bg-red-50 text-red-500 font-bold p-3 rounded-xl border border-red-100">Sair da Conta</button>
          </div>
        </div>
        <BottomNav/>
      </div></div>
    );
  }

  return null;
}

// ==========================================
// TELA DE AUTH — componente separado
// ==========================================
function TelaAuth({ supabase }) {
  const [modo, setModo] = useState('login');
  const [email, setEmail] = useState('');
  const [senha, setSenha] = useState('');
  const [nome, setNome] = useState('');
  const [nomeRede, setNomeRede] = useState('');
  const [loading, setLoading] = useState(false);
  const [erro, setErro] = useState('');
  const [sucesso, setSucesso] = useState('');

  const handleLogin = async () => {
    if (!email || !senha) return;
    setLoading(true); setErro('');
    const { error } = await supabase.auth.signInWithPassword({ email, password: senha });
    if (error) setErro('Email ou senha incorretos.');
    setLoading(false);
  };

  const handleCadastro = async () => {
    if (!nome.trim() || !nomeRede.trim() || !email || senha.length < 6) {
      setErro('Preencha todos os campos. Senha mínimo 6 caracteres.'); return;
    }
    setLoading(true); setErro('');
    const { data, error } = await supabase.auth.signUp({
      email, password: senha,
      options: { data: { nome, nome_rede: nomeRede } }
    });
    if (error) {
      if (error.message.includes('already registered') || error.message.includes('already been registered')) {
        setErro('Este e-mail já possui uma conta. Use a opção Entrar.');
      } else {
        setErro('Erro ao criar conta: ' + error.message);
      }
    } else if (data?.user && !data?.session) {
      setSucesso('Conta criada! Verifique seu e-mail para confirmar o cadastro e depois faça login.');
      setModo('login');
    } else {
      setSucesso('Conta criada com sucesso!');
      setModo('login');
    }
    setLoading(false);
  };

  return (
    <div className="flex-1 flex flex-col p-6 bg-slate-900 justify-center items-center animate-fade-in overflow-y-auto hide-scrollbar">
      <div className="w-full max-w-sm">
        <div className="text-center mb-10">
          <div className="w-20 h-20 bg-brand rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl">
            <div className="text-white w-10 h-10"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="100%" height="100%"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg></div>
          </div>
          <h1 className="text-4xl font-extrabold text-white tracking-tight">Perda<span className="text-brand">Zero</span></h1>
          <p className="text-slate-400 mt-2 text-sm">Gestão de desperdício para redes de alimentação</p>
        </div>

        <div className="flex bg-slate-800 p-1 rounded-2xl mb-6">
          <button onClick={() => { setModo('login'); setErro(''); setSucesso(''); }}
            className={`flex-1 py-3 font-bold rounded-xl text-sm transition-colors ${modo==='login'?'bg-white text-slate-900 shadow':'text-slate-400'}`}>Entrar</button>
          <button onClick={() => { setModo('cadastro'); setErro(''); setSucesso(''); }}
            className={`flex-1 py-3 font-bold rounded-xl text-sm transition-colors ${modo==='cadastro'?'bg-brand text-white shadow':'text-slate-400'}`}>Criar Conta</button>
        </div>

        <div className="space-y-3">
          {modo === 'cadastro' && (
            <>
              <input type="text" placeholder="Nome da sua rede (Ex: Roy's)" value={nomeRede} onChange={e => setNomeRede(e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-medium placeholder:text-slate-500 focus:border-brand focus:outline-none"/>
              <input type="text" placeholder="Seu nome" value={nome} onChange={e => setNome(e.target.value)}
                className="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-medium placeholder:text-slate-500 focus:border-brand focus:outline-none"/>
            </>
          )}
          <input type="email" placeholder="seu@email.com" value={email} onChange={e => setEmail(e.target.value)}
            className="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-medium placeholder:text-slate-500 focus:border-brand focus:outline-none"/>
          <input type="password" placeholder="Senha (mín. 6 caracteres)" value={senha} onChange={e => setSenha(e.target.value)}
            onKeyDown={e => e.key==='Enter' && (modo==='login'?handleLogin():handleCadastro())}
            className="w-full bg-slate-800 border border-slate-700 text-white p-4 rounded-2xl font-medium placeholder:text-slate-500 focus:border-brand focus:outline-none"/>

          {erro && <p className="text-red-400 text-sm font-medium text-center py-1">{erro}</p>}
          {sucesso && <p className="text-green-400 text-sm font-medium text-center py-1">{sucesso}</p>}

          <button onClick={modo==='login'?handleLogin:handleCadastro}
            disabled={loading||!email||!senha}
            className={`w-full py-4 rounded-2xl font-bold text-white text-lg transition-all mt-2 ${loading||!email||!senha?'bg-slate-700 text-slate-500':'bg-brand shadow-lg active:scale-95'}`}>
            {loading ? 'Aguarde...' : modo==='login' ? 'Entrar no Painel' : 'Começar 20 dias grátis →'}
          </button>

          {modo === 'login' && (
            <button onClick={async () => {
              if (!email) { setErro('Digite seu email primeiro.'); return; }
              await supabase.auth.resetPasswordForEmail(email);
              setSucesso('Link de redefinição enviado para seu email.');
            }} className="w-full text-slate-500 text-sm font-medium py-2 text-center">Esqueci minha senha</button>
          )}
        </div>

        {modo === 'cadastro' && (
          <p className="text-slate-600 text-xs text-center mt-6">
            20 dias grátis, sem cartão. Após o trial, planos a partir de R$ 49/mês.
          </p>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
